<!DOCTYPE HTML>
<html>
<head>
<style>
.container{
display:flex;
flex-wrap:wrap;
gap:3px;
}
.flex-item{
background-color:blue;
height:30px;
padding:13px;
}
.flex-item:nth-child(3){
flex-grow:3;}
</style>
</head>
<body>
<div class="container">
<div class="flex-item">1</div>
<div class="flex-item">2</div>
<div class="flex-item">3</div>
<div class="flex-item">4</div>
</div>
</body>
</html>
