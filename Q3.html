<!DOCTYPE HTML>
<html>
<head>
<title>Equal height</title>
<style>
.Card{
display:flex;
flex-direction:center;
align-item:center;
justify-content:center;
width:20px;
height:30px;
background-color:blue;
}
.Card1{
width:40px;
height:30px;
background-color:red;
}
.Card2{
width:50px;
height:30px;
background-color:green;
}
</style>
</head>
<body>
<div class="Card">1</div>
<div class="Card1">2</div>
<div class="Card2">3</div>
</body>
</html>
