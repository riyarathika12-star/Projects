<!DOCTYPE html>
<html>
<head>
<title>Flex and content</title>
<style>
.Box{
display:flex;
flex-direction:center;
align-item:center;
justify-content:flexend;
width:20px;
height:20px;
background-color:blue;}
.Box1{
width:20px;
height:20px;
background-color:red;
} 
.Box2{
width:20px;
height:20px;
background-color:green;
}
.Box3{
width:20px;
height:20px;
background-color:rgb(250, 5, 46);
}
</style>
</head>
<body>
<div class="Box">1</div>
<div class="Box1">2</div>
<div class="Box2">3</div>
<div class="Box3">4</div>
</body>
</html>
